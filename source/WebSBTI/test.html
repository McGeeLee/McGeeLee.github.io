<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI人格测试 - 测试页</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="shell">
    <div class="test-wrap card">
      <div class="topbar">
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 0</div>
      </div>
      <div class="question-list" id="questionList"></div>
      <div class="actions-bottom">
        <div class="hint" id="hint">全选完才会放行。世界已经够乱了，起码把题做完整。</div>
        <div class="btn-group">
          <button class="btn-secondary" onclick="backHome()">返回首页</button>
          <button class="btn-primary" id="submitBtn" onclick="submitTest()">提交并查看结果</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let allQuestions = [];
    let answers = {};

    function initTest() {
      const shuffled = shuffle([...questions]);
      const insertPos = Math.floor(Math.random() * shuffled.length) + 1;
      allQuestions = [
        ...shuffled.slice(0, insertPos),
        specialQuestions[0],
        ...shuffled.slice(insertPos)
      ];
      answers = {};
      updateVisibleQuestions();
    }

    function updateVisibleQuestions() {
      let visibleQuestions = [...allQuestions];
      const drinkGateIndex = visibleQuestions.findIndex(q => q.id === 'drink_gate_q1');

      if (drinkGateIndex !== -1 && answers.drink_gate_q1 === 3) {
        visibleQuestions.splice(drinkGateIndex + 1, 0, specialQuestions[1]);
      }

      const doneCount = visibleQuestions.filter(q => answers[q.id] !== undefined).length;
      const totalCount = visibleQuestions.length;
      const progressPercent = totalCount > 0 ? (doneCount / totalCount * 100) : 0;

      document.getElementById('progressBar').style.width = progressPercent + '%';
      document.getElementById('progressText').textContent = doneCount + ' / ' + totalCount;

      const hint = document.getElementById('hint');
      if (doneCount === totalCount && totalCount > 0) {
        hint.textContent = '都做完了。现在可以把你的电子魂魄交给结果页审判。';
      } else {
        hint.textContent = '全选完才会放行。世界已经够乱了，起码把题做完整。';
      }

      renderQuestions(visibleQuestions);
    }

    function renderQuestions(visibleQuestions) {
      const container = document.getElementById('questionList');
      container.innerHTML = '';

      visibleQuestions.forEach((q, index) => {
        const questionDiv = document.createElement('div');
        questionDiv.className = 'question';

        const metaDiv = document.createElement('div');
        metaDiv.className = 'question-meta';
        metaDiv.innerHTML = `
          <span class="badge">第 ${index + 1} 题</span>
          <span>${q.special ? '补充题' : '维度已隐藏'}</span>
        `;

        const titleDiv = document.createElement('div');
        titleDiv.className = 'question-title';
        titleDiv.textContent = q.text;

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        q.options.forEach((opt, optIndex) => {
          const optionCode = ['A', 'B', 'C', 'D'][optIndex];
          const isSelected = answers[q.id] === opt.value;

          const optionLabel = document.createElement('label');
          optionLabel.className = 'option' + (isSelected ? ' selected' : '');
          optionLabel.dataset.qid = q.id;
          optionLabel.dataset.val = opt.value;
          optionLabel.innerHTML = `
            <input type="radio" name="q-${q.id}" value="${opt.value}" ${isSelected ? 'checked' : ''}>
            <span class="option-code">${optionCode}</span>
            <span>${opt.label}</span>
          `;
          optionLabel.addEventListener('click', () => selectOption(q.id, opt.value));
          optionsDiv.appendChild(optionLabel);
        });

        questionDiv.appendChild(metaDiv);
        questionDiv.appendChild(titleDiv);
        questionDiv.appendChild(optionsDiv);
        container.appendChild(questionDiv);
      });
    }

    function selectOption(questionId, value) {
      const newAnswers = { ...answers };
      newAnswers[questionId] = value;

      if (questionId === 'drink_gate_q1' && value !== 3) {
        delete newAnswers.drink_gate_q2;
      }

      answers = newAnswers;
      updateVisibleQuestions();
    }

    function backHome() {
      window.location.href = 'index.html';
    }

    function submitTest() {
      const visibleQuestions = [...allQuestions];
      const drinkGateIndex = visibleQuestions.findIndex(q => q.id === 'drink_gate_q1');
      if (drinkGateIndex !== -1 && answers.drink_gate_q1 === 3) {
        visibleQuestions.splice(drinkGateIndex + 1, 0, specialQuestions[1]);
      }

      const doneCount = visibleQuestions.filter(q => answers[q.id] !== undefined).length;
      const totalCount = visibleQuestions.length;

      if (doneCount !== totalCount) {
        alert('请完成所有题目后再提交！');
        return;
      }

      saveAnswers(answers);
      window.location.href = 'result.html';
    }

    initTest();
  </script>
</body>
</html>
